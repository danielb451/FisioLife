<div class="login-page">
  <section class="login-wrapper">
    <div class="info-panel">
      <div class="badge">FisioLife</div>

      <h1>Gestión clínica fisioterapéutica</h1>

      <p>
        Accede al sistema para administrar pacientes, citas, tratamientos,
        fisioterapeutas y seguimiento clínico.
      </p>

      <div class="features">
        <span>Pacientes</span>
        <span>Citas</span>
        <span>Tratamientos</span>
        <span>Reportes</span>
      </div>
    </div>

    <div class="login-card">
      <div class="brand">
        <div class="logo">FL</div>

        <div>
          <h2>Iniciar sesión</h2>
          <p>Acceso administrativo</p>
        </div>
      </div>

      <form (ngSubmit)="iniciarSesion()">
        <label>Correo electrónico</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="admin@fisio.com"
        />

        <label>Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Ingresa tu contraseña"
        />

        <div class="error" *ngIf="error">
          {{ error }}
        </div>

        <button type="submit" [disabled]="cargando">
          {{ cargando ? 'Ingresando...' : 'Entrar al sistema' }}
        </button>
      </form>

      
    </div>
  </section>
</div>
